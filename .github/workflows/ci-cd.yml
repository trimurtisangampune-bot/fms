name: FMS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DEBUG: "False"
      SECRET_KEY: test-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: sqlite:///db.sqlite3
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check --deploy

      - name: Migrations safety check
        run: python manage.py makemigrations --check --dry-run

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-quality
    defaults:
      run:
        working-directory: backend
    env:
      DEBUG: "False"
      SECRET_KEY: test-secret-key
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: sqlite:///db.sqlite3
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python manage.py test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            npm ci && break
            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Build frontend
        env:
          CI: "true"
          REACT_APP_API_URL: https://api.example.com/api
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    outputs:
      db_tag: ${{ steps.meta_db.outputs.tags }}
      backend_tag: ${{ steps.meta_backend.outputs.tags }}
      frontend_tag: ${{ steps.meta_frontend.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend image metadata
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest

      - name: Database image metadata
        id: meta_db
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/db
          tags: |
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest

      - name: Frontend image metadata
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=sha,prefix=,suffix=,format=long
            type=raw,value=latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push database
        uses: docker/build-push-action@v5
        with:
          context: ./database
          push: true
          tags: ${{ steps.meta_db.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          build-args: REACT_APP_API_URL=${{ vars.REACT_APP_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: ${{ vars.APP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}

            export IMAGE_TAG="${{ github.sha }}"
            export DB_IMAGE="ghcr.io/${{ github.repository }}/db:${IMAGE_TAG}"
            export BACKEND_IMAGE="ghcr.io/${{ github.repository }}/backend:${IMAGE_TAG}"
            export FRONTEND_IMAGE="ghcr.io/${{ github.repository }}/frontend:${IMAGE_TAG}"

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull "$DB_IMAGE"
            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"

            # Write .env from secrets (server-side environment variable)
            echo "${{ secrets.PRODUCTION_ENV }}" > .env

            # Rolling restart - zero-downtime with depends_on health checks
            docker compose --env-file .env pull
            docker compose --env-file .env up -d --remove-orphans

            # Post-deploy health check
            sleep 5
            docker compose ps
            HTTP_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 10 \
              -X POST "http://localhost:${{ secrets.BACKEND_PORT || 8000 }}/api/auth/token/" \
              -H 'Content-Type: application/json' \
              -d '{}')
            if [ "$HTTP_STATUS" = "400" ] || [ "$HTTP_STATUS" = "401" ]; then
              echo "Health check passed with status $HTTP_STATUS"
            else
              echo "Health check failed with status $HTTP_STATUS"
              exit 1
            fi
