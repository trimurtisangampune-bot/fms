# Production-style stack.
# Set all required variables in a .env file at the project root or pass via
# environment.  See backend/.env.example for the full variable list.

services:

  db:
    image: ${DB_IMAGE:-ghcr.io/trimurtisangampune-bot/fms/db:latest}
    build:
      context: ./database
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-fms_db}
      POSTGRES_USER:     ${DB_USER:-fms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fms_user} -d ${DB_NAME:-fms_db}"]
      interval: 10s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/trimurtisangampune-bot/fms/backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgres://${DB_USER:-fms_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-fms_db}"
      DB_SSL_REQUIRE: "${DB_SSL_REQUIRE:-False}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8000/admin/login/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/trimurtisangampune-bot/fms/frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
