version: "3.9"

# Development override – runs only PostgreSQL so you can run the Django dev
# server and React dev server locally.
# Usage: docker compose -f docker-compose.dev.yml up -d

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       s_fms
      POSTGRES_USER:     s_fms
      POSTGRES_PASSWORD: s_fms@2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

volumes:
  postgres_data_dev:
